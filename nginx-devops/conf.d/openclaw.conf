# ============================================================
#  OPENCLAW  →  http://127.0.0.1:18789
#  HTTP и WebSocket идут через один порт, поэтому location один.
#
#  Что менять здесь (ищи метку "ЗАМЕНИ"):
#    1. server_name — поддомены (в ДВУХ местах, списки должны совпадать)
#    2. proxy_pass  — порт, если openclaw проброшен не на 18789
#    3. client_max_body_size — лимит загрузки файлов
#
#  После настройки nginx обязательно настрой сам openclaw
#  (trustedProxies, allowedOrigins, auth) — см. README.
# ============================================================

# --- Блок 1: порт 80 — только редирект на https ---
server {
    listen 80;

    # ЗАМЕНИ: поддомены. Первые два — основной и тестовый,
    # последние два — запасные (не нужны — удали).
    server_name openclaw.sblabs.ru openclaw-test.sblabs.ru
                openclaw-dev.sblabs.ru openclaw-demo.sblabs.ru;

    return 301 https://$host$request_uri;
}

# --- Блок 2: порт 443 — основной трафик ---
server {
    # "http2" в строке listen — старый синтаксис, нужен для nginx 1.20-1.24 (RHEL 9).
    listen 443 ssl http2;

    # ЗАМЕНИ: поддомены — тот же список, что в блоке выше.
    server_name openclaw.sblabs.ru openclaw-test.sblabs.ru
                openclaw-dev.sblabs.ru openclaw-demo.sblabs.ru;

    # Самоподписанный сертификат (шифрует участок «фронт → этот сервер»).
    ssl_certificate     /etc/nginx/ssl/sblabs-selfsigned.crt;   # ЗАМЕНИ: путь, если другой
    ssl_certificate_key /etc/nginx/ssl/sblabs-selfsigned.key;   # ЗАМЕНИ: путь, если другой

    # Современный TLS: только 1.2/1.3 и шифры с ECDHE. Менять не нужно.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # Лимит на размер загружаемого файла (иначе ошибка 413).
    client_max_body_size 50m;   # ЗАМЕНИ: если файлы крупнее

    location / {
        # Куда проксируем.
        proxy_pass http://127.0.0.1:18789;   # ЗАМЕНИ: порт openclaw, если другой

        # WebSocket — обязательно, иначе Control UI не подключится.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Заголовки строго по документации openclaw:
        # в X-Forwarded-For — ровно ОДИН IP ($remote_addr = настоящий IP клиента,
        # его подставил realip из 00-common.conf). Не менять на $proxy_add_x_forwarded_for.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;

        # Удаляем identity-заголовки: клиент мог бы прислать их сам
        # и выдать себя за другого пользователя.
        proxy_set_header Tailscale-User-Login "";
        proxy_set_header Tailscale-User-Name "";

        # Агент стримит ответы и держит долгие ws-сессии:
        # таймаут — час (иначе nginx рвёт «тихие» соединения),
        # буферизация выключена (иначе стриминг идёт рывками и бывают 502).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
