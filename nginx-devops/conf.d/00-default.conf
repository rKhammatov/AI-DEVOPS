# ============================================================
#  ЗАГЛУШКА — ловит запросы по голому IP или с неизвестным Host
#  и молча обрывает соединение (444 = "закрыть без ответа").
#  Без неё такие запросы попали бы в случайный сервис.
#
#  Что менять здесь (ищи метку "ЗАМЕНИ"):
#    1. пути к сертификату — если положил его не в /etc/nginx/ssl/
#
#  ВАЖНО: в /etc/nginx/nginx.conf на RHEL уже есть блок
#  "listen 80 default_server" — его нужно закомментировать (README, шаг 6),
#  иначе nginx -t упадёт с ошибкой "duplicate default server".
# ============================================================

# Порт 80: обрыв соединения.
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# Порт 443: то же самое, но для https нужен сертификат — берём тот же.
server {
    # "http2" в строке listen — старый синтаксис, нужен для nginx 1.20-1.24 (RHEL 9).
    listen 443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/sblabs-selfsigned.crt;   # ЗАМЕНИ: путь к сертификату
    ssl_certificate_key /etc/nginx/ssl/sblabs-selfsigned.key;   # ЗАМЕНИ: путь к ключу
    ssl_protocols TLSv1.2 TLSv1.3;

    return 444;
}
