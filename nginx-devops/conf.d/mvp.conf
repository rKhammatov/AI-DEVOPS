# ============================================================
#  MVP — два апстрима:
#    обычные запросы  →  http://127.0.0.1:5042   (location /)
#    websocket        →  http://127.0.0.1:5043   (location /ws)
#
#  Что менять здесь (ищи метку "ЗАМЕНИ"):
#    1. server_name — поддомены (в ДВУХ местах, списки должны совпадать)
#    2. proxy_pass  — оба порта, если проброшены иначе
#    3. location /ws — путь, если ws живёт не на /ws
#    4. client_max_body_size — лимит загрузки файлов
# ============================================================

# --- Блок 1: порт 80 — только редирект на https ---
server {
    listen 80;

    # ЗАМЕНИ: поддомены. Первые два — основной и тестовый,
    # последние два — запасные (не нужны — удали).
    server_name mvp.sblabs.ru mvp-test.sblabs.ru
                mvp-dev.sblabs.ru mvp-demo.sblabs.ru;

    return 301 https://$host$request_uri;
}

# --- Блок 2: порт 443 — основной трафик ---
server {
    # "http2" в строке listen — старый синтаксис, нужен для nginx 1.20-1.24 (RHEL 9).
    listen 443 ssl http2;

    # ЗАМЕНИ: поддомены — тот же список, что в блоке выше.
    server_name mvp.sblabs.ru mvp-test.sblabs.ru
                mvp-dev.sblabs.ru mvp-demo.sblabs.ru;

    # Самоподписанный сертификат (шифрует участок «фронт → этот сервер»).
    ssl_certificate     /etc/nginx/ssl/sblabs-selfsigned.crt;   # ЗАМЕНИ: путь, если другой
    ssl_certificate_key /etc/nginx/ssl/sblabs-selfsigned.key;   # ЗАМЕНИ: путь, если другой

    # Современный TLS: только 1.2/1.3 и шифры с ECDHE. Менять не нужно.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # Лимит на размер загружаемого файла (иначе ошибка 413).
    client_max_body_size 50m;   # ЗАМЕНИ: если файлы крупнее

    # --- WebSocket: всё, что начинается с /ws, уходит на ws-порт ---
    location /ws {                            # ЗАМЕНИ: путь, если ws не на /ws
        proxy_pass http://127.0.0.1:5043;     # ЗАМЕНИ: websocket-порт mvp

        # Обязательные заголовки для websocket.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Стандартные заголовки. $remote_addr = настоящий IP клиента
        # (его подставил realip из 00-common.conf).
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;

        # ws-соединения живут долго и могут молчать:
        # таймаут — час, буферизация на ws недопустима.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # --- Обычный HTTP-трафик (API, статика) ---
    location / {
        proxy_pass http://127.0.0.1:5042;     # ЗАМЕНИ: HTTP-порт mvp

        # Upgrade/Connection и здесь: страховка, если ws вдруг откроется не по /ws.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;

        # Обычные запросы: 5 минут таймаута. Буферизация выключена
        # на случай стриминга ответов; если mvp не стримит — строку можно убрать.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }
}
