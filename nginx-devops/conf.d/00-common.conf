# ============================================================
#  ОБЩИЕ НАСТРОЙКИ — нужны всем сервисам, файл читается первым (префикс 00-).
#
#  Что менять здесь (ищи метку "ЗАМЕНИ"):
#    1. set_real_ip_from — IP внешнего фронта
# ============================================================

# --- WebSocket ---
# Создаёт переменную $connection_upgrade, которую используют все конфиги.
# Логика: клиент прислал "Upgrade: websocket" -> апстриму уйдёт "Connection: upgrade".
# Убрать нельзя: без неё ws-соединения через прокси не установятся.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# --- Реальный IP клиента ---
# Фронт присылает IP клиента в заголовке X-Forwarded-For.
# Эти две строки говорят nginx: "верь этому заголовку, но ТОЛЬКО от фронта".
# После этого $remote_addr во всех конфигах = настоящий IP клиента.
set_real_ip_from 192.0.2.1;          # ЗАМЕНИ: IP внешнего фронта
real_ip_header X-Forwarded-For;

# --- Кеш TLS-сессий ---
# Ускоряет повторные подключения фронта (не делается полный handshake).
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
